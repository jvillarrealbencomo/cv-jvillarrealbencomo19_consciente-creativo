{% extends "base.html" %}

{% block title %}Advanced Training & Certifications - CV Builder{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-award"></i> Advanced Training & Certifications
                    </h4>
                </div>
                <div class="card-body">
                    <form id="advancedTrainingForm">
                        <input type="hidden" id="trainingId" name="id" value="{{ training.id if training else '' }}">
                        
                        <!-- Type Selector -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="border-bottom pb-2 mb-3">Type</h5>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Type <span class="text-danger">*</span></label>
                                <select class="form-select" id="type" name="type" required>
                                    <option value="">-- Select Type --</option>
                                    <option value="Course" {{ 'selected' if training and training.type == 'Course' else '' }}>Course</option>
                                    <option value="Certification" {{ 'selected' if training and training.type == 'Certification' else '' }}>Certification</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="displayOrder" class="form-label">Display Order</label>
                                <input type="number" class="form-control" id="displayOrder" name="display_order" 
                                       value="{{ training.display_order if training else '0' }}"
                                       placeholder="0" min="0">
                                <small class="form-text text-muted">Lower numbers appear first</small>
                            </div>
                        </div>

                        <!-- Common Fields -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="border-bottom pb-2 mb-3">Information</h5>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">Name/Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{ training.name if training else '' }}" required
                                       placeholder="e.g., Advanced English, AWS Solutions Architect">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="provider" class="form-label">Provider/Organization <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="provider" name="provider" 
                                       value="{{ training.provider if training else '' }}" required
                                       placeholder="e.g., Open English, AWS, Coursera">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="completionDate" class="form-label">Completion/Issue Date</label>
                                <input type="date" class="form-control" id="completionDate" name="completion_date" 
                                       value="{{ training.completion_date.isoformat() if training and training.completion_date else '' }}">
                            </div>
                            <div class="col-12 mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3"
                                          placeholder="Topics covered, achievements, key learnings...">{{ training.description if training else '' }}</textarea>
                            </div>
                        </div>

                        <!-- Course-Specific Fields -->
                        <div class="row mb-4" id="courseFields" style="display:none;">
                            <div class="col-12">
                                <h5 class="border-bottom pb-2 mb-3">Course Details</h5>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="durationHours" class="form-label">Duration (hours)</label>
                                <input type="number" class="form-control" id="durationHours" name="duration_hours" 
                                       value="{{ training.duration_hours if training else '' }}"
                                       placeholder="40" min="0">
                            </div>
                        </div>

                        <!-- Certification-Specific Fields -->
                        <div class="row mb-4" id="certificationFields" style="display:none;">
                            <div class="col-12">
                                <h5 class="border-bottom pb-2 mb-3">Certification Details</h5>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="expirationDate" class="form-label">Expiration Date</label>
                                <input type="date" class="form-control" id="expirationDate" name="expiration_date" 
                                       value="{{ training.expiration_date.isoformat() if training and training.expiration_date else '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="credentialId" class="form-label">Credential ID</label>
                                <input type="text" class="form-control" id="credentialId" name="credential_id" 
                                       value="{{ training.credential_id if training else '' }}"
                                       placeholder="Certificate number or ID">
                            </div>
                            <div class="col-12 mb-3">
                                <label for="credentialUrl" class="form-label">Credential URL</label>
                                <input type="url" class="form-control" id="credentialUrl" name="credential_url" 
                                       value="{{ training.credential_url if training else '' }}"
                                       placeholder="https://...">
                            </div>
                        </div>

                        <!-- Profile Visibility -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="border-bottom pb-2 mb-3">Profile Visibility</h5>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="visibleQaAnalyst" name="visible_qa_analyst" 
                                           {{ 'checked' if not training or training.visible_qa_analyst else '' }}>
                                    <label class="form-check-label" for="visibleQaAnalyst">
                                        <i class="bi bi-briefcase"></i> QA Analyst
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="visibleQaEngineer" name="visible_qa_engineer" 
                                           {{ 'checked' if not training or training.visible_qa_engineer else '' }}>
                                    <label class="form-check-label" for="visibleQaEngineer">
                                        <i class="bi bi-code-slash"></i> QA Engineer
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="visibleDataScientist" name="visible_data_scientist" 
                                           {{ 'checked' if not training or training.visible_data_scientist else '' }}>
                                    <label class="form-check-label" for="visibleDataScientist">
                                        <i class="bi bi-graph-up"></i> Data Scientist
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save"></i> Save
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="window.history.back()">
                                        <i class="bi bi-arrow-left"></i> Back
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('advancedTrainingForm');
    const typeSelect = document.getElementById('type');
    const courseFields = document.getElementById('courseFields');
    const certificationFields = document.getElementById('certificationFields');
    
    // Show/hide fields based on type
    function updateFieldsVisibility() {
        const type = typeSelect.value;
        courseFields.style.display = type === 'Course' ? 'block' : 'none';
        certificationFields.style.display = type === 'Certification' ? 'block' : 'none';
    }
    
    typeSelect.addEventListener('change', updateFieldsVisibility);
    updateFieldsVisibility(); // Initial state
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        
        // Convert checkboxes to boolean
        data.visible_qa_analyst = document.getElementById('visibleQaAnalyst').checked;
        data.visible_qa_engineer = document.getElementById('visibleQaEngineer').checked;
        data.visible_data_scientist = document.getElementById('visibleDataScientist').checked;
        
        // Clear type-specific fields based on type
        if (data.type === 'Course') {
            data.expiration_date = null;
            data.credential_id = null;
            data.credential_url = null;
        } else if (data.type === 'Certification') {
            data.duration_hours = null;
        }
        
        const trainingId = document.getElementById('trainingId').value;
        const url = trainingId ? `/api/advanced-training/${trainingId}` : '/api/advanced-training';
        const method = trainingId ? 'PUT' : 'POST';
        
        try {
            const response = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                if (!trainingId) {
                    document.getElementById('trainingId').value = result.id;
                }
                const addAnother = confirm('Saved successfully!\n\nWould you like to add another record?');
                if (addAnother) {
                    form.reset();
                    document.getElementById('trainingId').value = '';
                    updateFieldsVisibility();
                }
            } else {
                const err = await response.json().catch(() => null);
                alert('Failed to save' + (err && err.details ? `: ${err.details}` : ''));
            }
        } catch (error) {
            console.error('Error saving:', error);
            alert('An error occurred while saving');
        }
    });
});
</script>

{% endblock %}
