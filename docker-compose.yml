version: '3.8'

services:
  web:
    build: .
    container_name: cv-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded images across container restarts
      - ./app/static/uploads:/app/app/static/uploads
      # Persist generated PDFs
      - ./app/generated_pdfs:/app/app/generated_pdfs
      # Persist SQLite database
      - ./instance:/app/instance
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - MAX_CONTENT_LENGTH=5242880  # 5MB max upload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cv-network

  # Optional: Nginx reverse proxy for production
  # Uncomment if you want Nginx in front
  # nginx:
  #   image: nginx:alpine
  #   container_name: cv-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./app/static:/app/static:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - web
  #   networks:
  #     - cv-network

networks:
  cv-network:
    driver: bridge

volumes:
  # Named volumes for easier backup
  uploads:
  pdfs:
  database:
