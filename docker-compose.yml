# Docker Compose Configuration
# Professional CV Application - 2025 Version

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-app-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
    volumes:
      # Persist database
      - ./data:/app/data
      # Persist generated PDFs
      - ./generated_pdfs:/app/generated_pdfs
      # Persist uploads
      - ./uploads:/app/uploads
      # Persist logs
      - ./logs:/app/logs
    networks:
      - cv-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

