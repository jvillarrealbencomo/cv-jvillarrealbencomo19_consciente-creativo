{% extends "base.html" %}
{% block title %}Evidence Hub - {{ entry.title }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="mb-4">
        <h2 class="mb-1">{{ entry.title }}</h2>
        <div class="text-muted">{{ entry.stack }}</div>
        <p class="text-muted mt-2">{{ entry.description }}</p>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <video controls class="w-100">
                <source src="{{ entry.video_path }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</div>
{% endblock %}
