services:
  - type: web
    name: cv-jvillarrealbencomo19-consciente-creativo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    # PostgreSQL database will be auto-linked
    autoDeploy: true
